name: Build and Release Chief Logger

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.10.0

      - name: Build ChiefLogger.exe
        shell: pwsh
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pyinstaller --onefile --name ChiefLogger --noconfirm `
            --paths . `
            --paths "${{ github.workspace }}" `
            --add-data "core;core" `
            --add-data "companion;companion" `
            --collect-all core `
            --collect-all companion `
            --collect-submodules core `
            --collect-submodules companion `
            --collect-all faster_whisper `
            --collect-submodules sounddevice `
            --hidden-import core `
            --hidden-import core.coach `
            --hidden-import core.events `
            --hidden-import core.voice `
            --hidden-import core.session `
            --hidden-import core.telemetry `
            --hidden-import core.ptt `
            --hidden-import core.health `
            --hidden-import core.api_server `
            --hidden-import core.cloud_coach `
            --hidden-import core.hardware_archive `
            --hidden-import core.hardware_watcher `
            --hidden-import core.offline_buffer `
            --hidden-import core.sectors `
            --hidden-import core.setup_archive `
            --hidden-import core.setup_watcher `
            --hidden-import core.state `
            --hidden-import core.trace_analyzer `
            --hidden-import companion `
            --hidden-import pyirsdk `
            --hidden-import pyttsx3.drivers `
            --hidden-import pyttsx3.drivers.sapi5 `
            --hidden-import comtypes `
            chief.py

      - name: Sanity check
        shell: pwsh
        run: |
          if (-not (Test-Path dist/ChiefLogger.exe)) { Write-Error "exe missing"; exit 1 }
          $sizeMB = [math]::Round((Get-Item dist/ChiefLogger.exe).Length / 1MB, 1)
          Write-Host "Built ChiefLogger.exe ($sizeMB MB)"

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ChiefLogger.exe
          name: "Chief Logger ${{ github.ref_name }}"
          body: |
            ## Chief Logger ${{ github.ref_name }}
            Live AI Crew Chief for iRacing.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (non-tag builds)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: ChiefLogger
          path: dist/ChiefLogger.exe
